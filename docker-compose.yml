services:
  hexlet-project:
    build: .
    ports:
      - "8080:8080"
    environment:
      - GOOGLE_KEY=${GOOGLE_KEY}
      - GOOGLE_SECRET=${GOOGLE_SECRET}
      - MASTER_HOST=${MASTER_HOST}
      - MASTER_PORT=${MASTER_PORT}
      - SLAVE_HOST=${SLAVE_HOST}
      - SLAVE_PORT=${SLAVE_PORT}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - DB_SSLMODE=disable
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - master
      - slave
      - kafka  
    networks:
      - app-network
  master:
    image: postgres:17
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "5432:5432"
    volumes:
      - master_data:/var/lib/postgresql
      - ./db/migrations:/docker-entrypoint-initdb.d
      - ./db/setup-replication.sh:/docker-entrypoint-initdb.d/setup-replication.sh
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
  slave:
    image: postgres:17
    depends_on:
      master:
        condition: service_healthy
    environment:
      - PGPASSWORD=${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - slave_data:/var/lib/postgresql/data
    entrypoint: >
      bash -c "
      rm -rf /var/lib/postgresql/data/* &&
      until pg_basebackup -h master -D /var/lib/postgresql/data -U ${DB_USER} -vP -R -X stream; do
      echo 'Waiting for master...' && sleep 3;
      done;
      exec docker-entrypoint.sh postgres"
    networks:
      - app-network 

  zookeeper:
    image: zookeeper:3.7.0
    ports:
      - "2181:2181"
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:6.2.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - app-network

volumes:
  master_data:
  slave_data:

networks:
  app-network:
    driver: bridge
