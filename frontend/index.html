<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content-Security-Policy: базовый хардненинг (#215).
      - default-src 'self' — по умолчанию только свой origin (покрывает font-src/connect-src);
      - img-src 'self' data: https: blob: — картинки со своего origin, data-URI (иконки), https (аватарки/CDN площадок) и blob: (превью только что загруженного медиа через URL.createObjectURL);
      - style-src 'self' 'unsafe-inline' — Mantine инжектит инлайн-стили, без 'unsafe-inline' тема падает;
      - script-src 'self' — только собственные скрипты, инлайн-JS запрещён.
      На проде этот же CSP нужно продублировать HTTP-заголовком на уровне хостинга.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: https: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />
    <title>Отложка — автопостинг и кросспостинг в 7 соцсетей</title>
    <!-- Базовые SEO-меты; пер-страничные значения проставляет usePageMeta (shared/lib/seo). -->
    <meta
      name="description"
      content="Отложка — сервис автопостинга и кросспостинга: соберите контент-план один раз, и посты выйдут во ВКонтакте, Telegram, Дзен и ещё четыре площадки точно в срок."
    />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#2B50EC" />
    <link rel="canonical" href="https://otlozhka.ru/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Отложка" />
    <meta property="og:title" content="Отложка — автопостинг и кросспостинг в 7 соцсетей" />
    <meta
      property="og:description"
      content="Соберите контент-план один раз — Отложка опубликует посты во всех соцсетях точно в срок."
    />
    <meta property="og:url" content="https://otlozhka.ru/" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
